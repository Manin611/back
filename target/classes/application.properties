# Configuración para que funcione tanto en Local como en Railway automáticamente
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:tu_base_local}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate/JPA para que cree las tablas solas al subir
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true